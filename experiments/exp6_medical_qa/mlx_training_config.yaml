# MLX LoRA Training Config for Medical QA Instruction Tuning
# Optimized for M4 Max 64GB - rank=32, adamw, cosine schedule

# LoRA parameters
lora_parameters:
  rank: 32
  alpha: 64
  dropout: 0.05
  scale: 4.0

# Training
batch_size: 2
grad_accumulation_steps: 16
learning_rate: 1e-5
iters: 2500
max_seq_length: 1024
optimizer: adamw
lr_schedule:
  name: cosine_decay
  warmup: 100
  arguments: [1e-5, 2500]

# LoRA on all layers
num_layers: -1
fine_tune_type: lora

# Memory optimization
grad_checkpoint: true
mask_prompt: true

# Logging & saving
steps_per_report: 50
steps_per_eval: 500
save_every: 500
val_batches: 25
test_batches: 500

# Seed
seed: 42
