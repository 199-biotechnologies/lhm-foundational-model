# Experiment 0: XGBoost Baseline
# Standard ML on tabular features — the bar to beat

experiment:
  name: "exp0_xgboost"
  description: "XGBoost baseline on tabular EHR features"

model:
  name: "xgboost"
  type: "gradient_boosting"
  params:
    n_estimators: 500
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 5
    reg_alpha: 0.1
    reg_lambda: 1.0

data:
  source: "mimic-iv"
  format: "tabular"  # Flattened features
  features:
    demographics: ["age", "gender"]
    labs: ["latest_values", "trends"]  # Most recent + delta from previous
    diagnoses: ["icd_code_counts"]  # Bag of ICD codes
    vitals: ["last_24h_summary"]
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

evaluation:
  tasks:
    - "readmission_30day"
    - "next_diagnosis"
    - "lab_trajectory"
    - "mortality"
